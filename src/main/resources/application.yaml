spring:
  application:
    name: product-aggregator

server:
  port: 8080

aggregator:
  timeouts:
    catalog-ms: 200
    pricing-ms: 300
    availability-ms: 350
    customer-ms: 200

  mocks:
    catalog:
      latency-ms: 50
      reliability: 0.999
    pricing:
      latency-ms: 80
      reliability: 0.995
    availability:
      latency-ms: 100
      reliability: 0.98
    customer:
      latency-ms: 60
      reliability: 0.99

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.example.aggregator: INFO
